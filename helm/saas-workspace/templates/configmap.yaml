apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  NODE_ENV: {{ .Values.backend.env.NODE_ENV | quote }}
  JWT_ACCESS_EXPIRES_IN: {{ .Values.backend.env.JWT_ACCESS_EXPIRES_IN | quote }}
  JWT_REFRESH_EXPIRES_IN: {{ .Values.backend.env.JWT_REFRESH_EXPIRES_IN | quote }}
  PAYMENT_PROVIDER: {{ .Values.backend.env.PAYMENT_PROVIDER | quote }}
  RLS_AUTO_APPLY: {{ .Values.backend.env.RLS_AUTO_APPLY | default "true" | quote }}
  OTEL_ENABLED: {{ .Values.backend.env.OTEL_ENABLED | default "true" | quote }}
  FEATURE_PAYMENTS: {{ .Values.backend.env.FEATURE_PAYMENTS | default "true" | quote }}
  FEATURE_INVITES: {{ .Values.backend.env.FEATURE_INVITES | default "true" | quote }}
  FEATURE_REALTIME: {{ .Values.backend.env.FEATURE_REALTIME | default "true" | quote }}
  FEATURE_AUDIT_LOGS: {{ .Values.backend.env.FEATURE_AUDIT_LOGS | default "true" | quote }}
  FEATURE_RATE_LIMITING: {{ .Values.backend.env.FEATURE_RATE_LIMITING | default "true" | quote }}
