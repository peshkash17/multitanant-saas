version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_workspace
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: saas-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_SYNCHRONIZE: 'true'
      JWT_SECRET: change-this-in-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PAYMENT_PROVIDER: mock
      FRONTEND_URL: http://localhost
      RLS_AUTO_APPLY: 'true'
      OTEL_ENABLED: 'true'
      FEATURE_PAYMENTS: 'true'
      FEATURE_INVITES: 'true'
      FEATURE_REALTIME: 'true'
      FEATURE_AUDIT_LOGS: 'true'
      FEATURE_RATE_LIMITING: 'true'
      CACHE_STORE: redis
      THROTTLE_USE_REDIS: 'true'
    volumes:
      - ./docker/postgres/rls-policies.sql:/app/rls-policies.sql:ro
    ports:
      - '3000:3000'
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ''
    container_name: saas-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: saas-nginx
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
