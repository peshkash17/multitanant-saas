apiVersion: v1
kind: ConfigMap
metadata:
  name: saas-config
  namespace: saas-workspace
data:
  NODE_ENV: production
  PORT: "3000"
  DB_HOST: db.your-project-ref.supabase.co
  DB_PORT: "5432"
  DB_NAME: postgres
  DB_SSL: "true"
  DB_SYNCHRONIZE: "false"
  REDIS_HOST: your-redis-host.db.redis.io
  REDIS_PORT: "16396"
  REDIS_USERNAME: default
  REDIS_TLS: "false"
  CACHE_STORE: redis
  FRONTEND_URL: https://workspace.example.com
  JWT_ACCESS_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  PAYMENT_PROVIDER: mock
  RLS_AUTO_APPLY: "false"
  OTEL_ENABLED: "false"
