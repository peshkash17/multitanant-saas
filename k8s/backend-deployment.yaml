apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: saas-workspace
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/peshkash17/multitanant-saas/backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: saas-config
            - secretRef:
                name: saas-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: saas-workspace
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
